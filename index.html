<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projeto Astra - Hub do Concurseiro</title>
  
  <link rel="stylesheet" href="css/style.css">

  <style>
    /* Sobrescrevendo as variáveis globais do seu style.css apenas para a Home */
    :root {
      --bg-color: #050505;          /* Fundo escuro */
      --surface-color: #121212;
      --text-dark: #ffffff;         /* Texto principal branco */
      --text-light: #a1a1aa;        /* Texto secundário cinza */
      --border-color: rgba(255, 255, 255, 0.1);
      
      /* Variáveis extras para os efeitos da Landing Page */
      --blue-glow: rgba(59, 130, 246, 0.3);
    }

    /* Efeitos de Fundo: Grade e Brilho Neon */
    body {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: -2;
    }

    body::after {
      content: '';
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(circle, var(--blue-glow) 0%, transparent 60%);
      filter: blur(60px);
      z-index: -1;
    }

    /* Navbar Superior */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
      border-bottom: 1px solid var(--border-color);
      backdrop-filter: blur(10px);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-dark);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo span {
      color: var(--primary-color);
    }

    .nav-links {
      display: flex;
      gap: 2rem;
    }

    .nav-links a {
      color: var(--text-light);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .nav-links a:hover {
      color: var(--text-dark);
    }

    /* Área Principal (Hero) */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 1.5rem;
    }

    .hero-title {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      letter-spacing: -1px;
    }

    .hero-subtitle {
      font-size: 1.1rem;
      color: var(--text-light);
      margin-bottom: 2.5rem;
      max-width: 600px;
    }

    /* Botões da Landing Page */
    .hero-buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 2rem;
      border-radius: var(--radius-lg);
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      font-size: 1rem;
    }

    .btn-primary {
      background-color: var(--primary-color);
      color: #ffffff;
      box-shadow: 0 4px 20px var(--blue-glow);
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(59, 130, 246, 0.5);
    }

    .btn-secondary {
      background-color: transparent;
      color: var(--text-dark);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background-color: rgba(255, 255, 255, 0.05);
      border-color: var(--text-dark);
      transform: translateY(-2px);
    }

    /* Responsividade dos botões */
    @media (min-width: 640px) {
      .hero-buttons {
        flex-direction: row;
        max-width: 600px;
        justify-content: center;
      }
      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      Projeto<span>Astra</span>
    </a>
    
    <div class="nav-links">
      <a href="editais/cbmal.html">Missões</a>
      <a href="ferramentas/calculadora.html">Calculadora</a>
    </div>
  </nav>

  <main class="container hero">
    <h1 class="hero-title">O Hub de Estudos que sua aprovação exige.</h1>
    
    <p class="hero-subtitle">
      Domine os editais da CBMAL e PMAL. Organize seu cronograma, cumpra suas missões e alcance a farda com tecnologia e eficiência.
    </p>
    
    <div class="hero-buttons">
      <a href="editais/cbmal.html" class="btn btn-primary">
        Acessar Missões
      </a>
      
      <a href="ferramentas/calculadora.html" class="btn btn-secondary">
        Cronograma de Estudos
      </a>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
